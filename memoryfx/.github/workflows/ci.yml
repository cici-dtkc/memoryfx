name: CI - Kiểm tra Memory Game

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
    branches: [ '**' ]   

jobs:
  build-and-test:
    name: Build và Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Lấy code từ repository
        uses: actions/checkout@v4
      
      - name: Cài đặt JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Kiểm tra cấu trúc thư mục
        run: |
          echo "📁 Kiểm tra cấu trúc dự án..."
          ls -la src/main/java/com/game/memory/
          echo "✅ Cấu trúc OK"
      
      - name: Build với Maven
        run: mvn clean compile
      
      - name: Chạy Unit Test
        run: mvn test
      
      - name: Package thành JAR
        run: mvn package -DskipTests
      
      - name: Lưu file JAR
        uses: actions/upload-artifact@v4
        with:
          name: memory-game-jar
          path: target/*.jar
      
      - name: Thông báo kết quả
        run: echo "✅ CI thành công!"
