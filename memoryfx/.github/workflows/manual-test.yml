name: Manual - Chạy Test

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Loại test'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - unit

jobs:
  manual-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Chạy test
        run: mvn test
      
      - name: In kết quả
        run: |
          echo "## 📊 Kết quả test" >> $GITHUB_STEP_SUMMARY
          echo "✅ Hoàn thành lúc: $(date)" >> $GITHUB_STEP_SUMMARY
